name: Despliegue Continuo Frontend (CD)

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Iniciar sesión en GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # NUEVO PASO: Convierte todo el string a minúsculas y lo guarda en el entorno
      - name: Convertir nombre de repositorio a minúsculas
        run: |
          echo "IMAGE_TAG=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')/frontend-app:latest" >> $GITHUB_ENV

      - name: Construir y subir Imagen de Docker
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          # USAR VARIABLE: Cambiamos la expresión por la variable de entorno corregida
          tags: ${{ env.IMAGE_TAG }}
